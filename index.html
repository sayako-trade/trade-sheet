<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>過去トレ記録シート</title>
<style>
:root{
  --blue:#1565C0;--blue-lt:#E3F2FD;--blue-md:#90CAF9;
  --red:#C62828;--red-lt:#FFEBEE;--red-md:#EF9A9A;
  --orange:#E65100;--orange-lt:#FFF3E0;
  --green:#2E7D32;--green-lt:#E8F5E9;
  --purple:#6A1B9A;--purple-lt:#F3E5F5;
  --warn:#F57F17;--warn-lt:#FFF8E1;
  --gray:#546E7A;--gray-lt:#ECEFF1;
  --border:#CFD8DC;
  --bg:#F0F4F8;--card:#FFF;--text:#1A2332;--sub:#607D8B;--muted:#B0BEC5;
  --shadow:0 1px 4px rgba(0,0,0,.10);
  --font:'Meiryo','Hiragino Sans','Yu Gothic UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:12px}
.app{max-width:1600px;margin:0 auto;padding:10px 12px}
.card{background:var(--card);border-radius:8px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.ch{padding:8px 14px;font-weight:700;font-size:12.5px;background:#F5F7FA;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cb{padding:10px 14px}
.ctrl-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px 14px}
.ctrl{display:flex;align-items:center;gap:5px;white-space:nowrap}
.ctrl label{font-weight:700;font-size:12px;color:var(--sub)}
input[type=number],input[type=text]{font-family:var(--font);font-size:12px;border:1.5px solid var(--border);border-radius:5px;padding:4px 7px;background:#fff;color:var(--text);transition:border-color .15s}
input[type=number]:focus,input[type=text]:focus{outline:none;border-color:var(--blue)}
textarea{font-family:var(--font);font-size:11px;border:1.5px solid var(--border);border-radius:5px;padding:6px;resize:vertical;color:var(--text)}
textarea:focus{outline:none;border-color:var(--blue)}
.btn{font-family:var(--font);font-size:12px;padding:5px 13px;border:none;border-radius:5px;cursor:pointer;font-weight:700;transition:filter .1s,transform .08s}
.btn:not(:disabled):hover{filter:brightness(1.08)}
.btn:not(:disabled):active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:default}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--sub)}
.btn-outline:hover{background:var(--gray-lt)}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-xs{padding:1px 6px;font-size:10.5px;border-radius:4px}

/* レイアウト：大画面は横並び、iPad以下は縦積み */
.layout{display:flex;gap:10px;align-items:flex-start;min-width:0;flex-wrap:wrap}
.left-panel{flex:1 1 600px;min-width:0;overflow-x:auto}
.right-panel{flex:1 1 340px;min-width:280px;position:sticky;top:10px;max-height:calc(100vh - 20px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;align-self:flex-start}
.memo-sticky{position:static}
.memo-sticky.no-sticky{position:static}

/* iPadでは横スクロール可能なテーブルラップ */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* TABLE */
.table-wrap{overflow-x:auto}
table.trade{border-collapse:collapse;font-size:11px}
table.trade th,table.trade td{border:1px solid var(--border);padding:3px 6px;text-align:center;vertical-align:middle;white-space:nowrap}
table.trade th{background:#F5F7FA;font-weight:700;color:var(--sub);font-size:11px}
table.trade tr:hover td{background:#FAFCFF}
table.trade tr.row-ryodate td{background:#F3E5F5!important}
table.trade tr.row-ryodate:hover td{background:#EDE7F6!important}
/* 日区切りの強い下線 */
table.trade tr.day-end td{border-bottom:2px solid #90A4AE!important}
.cd{width:52px}.csl{width:26px;text-align:center!important;padding:2px 3px!important}
.cp{width:72px}.cdf{width:52px}.cob{width:34px}.cos{width:34px}
.cs{width:220px;text-align:left!important}.cpr{width:74px}

/* スロット価格入力 */
.slot-p-inp{width:68px;font-size:11px!important;padding:2px 4px!important;border:1px solid var(--border);border-radius:3px;background:#FFF9F0;color:var(--text)}
.slot-p-inp:focus{outline:none;border-color:var(--orange)}

/* ORDER BTN */
.ord-btn{width:26px;height:24px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;font-size:14px;font-weight:900;background:#FAFAFA;display:inline-flex;align-items:center;justify-content:center;transition:all .12s}
.ob{background:var(--blue-lt)!important;border-color:var(--blue)!important;color:var(--blue)!important}
.os{background:var(--red-lt)!important;border-color:var(--red)!important;color:var(--red)!important}

/* PRICE */
.ph{color:transparent;background:#E8EDF2;border-radius:3px;padding:0 4px;user-select:none}
.up{color:var(--red);font-weight:700}
.dn{color:var(--blue);font-weight:700}

/* SETTLE */
.sl{font-size:10.5px}
.si{display:flex;align-items:center;gap:4px;padding:2px 0;border-bottom:1px solid #F0F4F8;flex-wrap:wrap}
.si:last-child{border-bottom:none}
.si.auto-si{background:var(--warn-lt);border-radius:4px;padding:2px 4px;margin:1px 0;border:1px solid #FFE082}
.tb{color:var(--blue);font-weight:900}
.ts{color:var(--red);font-weight:900}
.brm{background:none;border:none;cursor:pointer;color:var(--muted);font-size:10px;padding:0 2px;transition:color .1s}
.brm:hover{color:var(--red)}
.auto-tag{font-size:9px;background:var(--warn-lt);color:var(--warn);border:1px solid #FFE082;border-radius:3px;padding:0 3px;font-weight:700}
.expiry-warn{font-size:9px;color:var(--red);font-weight:700;background:var(--red-lt);border-radius:3px;padding:1px 4px;display:inline-block;margin-left:2px}
.ryodate-tag{font-size:9px;background:var(--purple-lt);color:var(--purple);border-radius:3px;padding:0 3px;border:1px solid #CE93D8;font-weight:700}

/* SETTLE FORM */
.sf{background:var(--orange-lt);border:1.5px solid #FFCC80;border-radius:6px;padding:7px 9px;margin-top:4px;font-size:10.5px}
.sf .pl{border:1px solid var(--border);border-radius:4px;max-height:150px;overflow-y:auto;margin-bottom:6px;background:#fff}
.pi2{padding:3px 10px;cursor:pointer;display:flex;gap:7px;align-items:center;flex-wrap:nowrap;white-space:nowrap;border-bottom:1px solid #F5F7FA;transition:background .1s}
.pi2:last-child{border-bottom:none}
.pi2:hover{background:#F5F7FA}
.pi2.sel{background:var(--blue-lt)}
.pi2.expiring{background:#FFF8E1}
.sf .row2{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.sf .row2 input{width:90px}
.sf .btns{display:flex;gap:6px}
.ppos{color:var(--red);font-weight:700}
.pneg{color:var(--blue);font-weight:700}

/* MEMO GRID — 24グループ対応 4列×6行 */
.memo-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:8px 14px;background:#F5F7FA;border-bottom:1px solid var(--border)}
.memo-title{font-size:13px;font-weight:700}
.memo-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.memo-meta input{width:78px}
.g-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 12px}
.gc{border:2px solid var(--border);border-radius:7px;overflow:hidden;font-size:10px;transition:border-color .2s,box-shadow .2s}
.gc.cur{border-color:var(--orange)!important;box-shadow:0 0 0 3px #FF980033}
.gc.done{border-color:#A5D6A7}
.gh{background:#F5F7FA;padding:3px 7px;font-weight:700;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:11px}
.gc.cur .gh{background:var(--orange-lt)}
.gc.done .gh{background:var(--green-lt);color:var(--green)}
.gc-cols{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.gch{text-align:center;padding:2px 3px;font-weight:700;font-size:10px}
.gch.buy{color:var(--blue);border-right:1px solid var(--border)}
.gch.sell{color:var(--red)}
.ge-row{display:grid;grid-template-columns:1fr 1fr}
.ge{min-height:20px;padding:2px 5px;border-bottom:1px solid #F0F4F8;display:flex;flex-direction:column;justify-content:center}
.ge:last-child{border-bottom:none}
.ge.stl{text-decoration:line-through;color:var(--muted)!important;background:#FAFCFF}
.ge.stl .gep,.ge.stl .ged{color:var(--muted)!important}
.ge.stl .ge-fukumi{color:inherit!important;text-decoration:line-through}
.ge.auto-stl{background:#FFF8E1!important}
.ged{font-size:9px;color:var(--sub)}
.gep{font-weight:700;font-size:10px}
.ge.buy-e .gep{color:var(--blue)}
.ge.sell-e .gep{color:var(--red)}
.ge-exp{font-size:8px;color:var(--warn);font-weight:700}
.ge-fukumi{font-size:9px;font-weight:700;line-height:1.2}
.gcol:first-child{border-right:1px solid #E8EDF2}

/* BOTTOM */
.total-bar{display:flex;gap:20px;align-items:center;flex-wrap:wrap;padding:11px 18px}
.tc{display:flex;align-items:center;gap:8px}
.tc label{font-weight:700;white-space:nowrap;font-size:12px}
.tc input{width:115px;text-align:right}
.tbig{font-size:16px;font-weight:700}
.op{font-size:20px;font-weight:700;color:var(--muted)}

/* IMPORT */
.imp-paste-area{width:100%;height:110px;font-size:11px;font-family:'Courier New',monospace}
.imp-hint{font-size:10px;color:var(--sub);margin-bottom:6px;line-height:1.6}
.imp-stat{font-size:11px;padding:8px 12px;border-radius:5px;margin-top:8px;font-weight:700;overflow:visible}
.imp-stat.ok{background:var(--green-lt);color:var(--green)}
.imp-stat.err{background:var(--red-lt);color:var(--red)}
.imp-stat.warn{background:var(--warn-lt);color:var(--warn)}
.imp-preview{max-height:160px;overflow-y:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:4px;margin-top:8px;font-size:10px;background:#fff;font-weight:400}
.imp-prow{display:flex;gap:8px;padding:4px 8px;border-bottom:1px solid #F5F7FA;flex-wrap:wrap}
.imp-prow:last-child{border-bottom:none}
.imp-prow:nth-child(even){background:#FAFBFC}
.mono{font-family:'Courier New',monospace}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700}
.badge-orange{background:var(--orange-lt);color:var(--orange)}
.badge-green{background:var(--green-lt);color:var(--green)}
.tag-note{font-size:10px;color:var(--sub);background:var(--gray-lt);border-radius:4px;padding:1px 6px}

/* EXPIRE BANNER */
.expire-banner{background:var(--warn-lt);border:2px solid #FFB300;border-radius:8px;padding:9px 14px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--warn);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.expire-banner .items{font-weight:400;font-size:11px;color:var(--text)}

/* FIXED REVEAL BUTTON */
.fixed-reveal{position:fixed;bottom:22px;right:22px;z-index:1000;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.fixed-reveal .btn{box-shadow:0 3px 10px rgba(0,0,0,.22);font-size:13px;padding:9px 18px}
.fixed-reveal .rev-info{font-size:10px;background:rgba(0,0,0,.55);color:#fff;border-radius:5px;padding:2px 8px;white-space:nowrap}

/* KOSAI FIXED */
.kf-section{padding:8px 14px;border-bottom:1px solid var(--border)}
.kf-title{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.kf-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px;flex-wrap:wrap}
.kf-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;white-space:nowrap}
.kf-rieki{background:var(--green-lt);color:var(--green);border:1px solid #A5D6A7}
.kf-son{background:var(--red-lt);color:var(--red);border:1px solid var(--red-md)}
.kf-doji{background:var(--gray-lt);color:var(--gray);border:1px solid var(--border)}
.kf-amount{font-size:13px;font-weight:700}
.kf-desc{font-size:10px;color:var(--sub);line-height:1.5}
.progress-bar{height:10px;background:#E8EDF2;border-radius:5px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;border-radius:5px;transition:width .3s}

/* SOSAI */
.sosai-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px}
.sosai-group{flex:1;min-width:160px;max-width:100%}
.sosai-group-title{font-size:11px;font-weight:700;color:var(--sub);background:#F5F7FA;padding:3px 8px;border-radius:5px;margin-bottom:4px;border-left:3px solid var(--blue);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sosai-group-title:hover{background:#EEF2F6}
.sosai-body{max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;background:#fff}
.sosai-row{display:flex;align-items:center;gap:5px;padding:2px 5px;border-bottom:1px solid #F0F4F8;font-size:10.5px;flex-wrap:nowrap}
.sosai-row:last-child{border-bottom:none}
.sosai-row:hover{background:#FAFCFF}
.sosai-lbl{font-weight:700;color:var(--sub);min-width:30px;font-size:10px;flex-shrink:0}
.sosai-pos{display:flex;align-items:center;gap:2px;flex:1;flex-wrap:wrap;font-size:10px}
.sosai-res{font-size:11px;font-weight:700;text-align:right;min-width:72px;white-space:nowrap;flex-shrink:0}
.sosai-ok{color:var(--green)}
.sosai-ng{color:var(--red)}
.sosai-fix{font-size:9px;margin-left:2px;font-weight:400}
.sosai-achieved{font-size:9px;color:var(--green);background:var(--green-lt);border-radius:3px;padding:1px 3px;margin-left:2px}

/* SAVED LIST */
.saved-tag{background:#F5F7FA;border:1px solid var(--border);border-radius:4px;padding:1px 7px;cursor:pointer;font-size:10px;color:var(--sub)}
.saved-tag.cur{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);font-weight:700}
.saved-tag:hover{border-color:var(--blue);color:var(--blue)}

/* ═══ フェーズ1/2 追加スタイル ═══ */
/* ライブダッシュボード */
.live-bar{background:linear-gradient(135deg,#1A2332 0%,#263548 100%);color:#E8EDF2;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.25);margin-bottom:10px;overflow:hidden}
.live-bar-inner{display:flex;flex-wrap:wrap;align-items:stretch;gap:0}
.live-cell{padding:10px 16px;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:130px}
.live-cell:last-child{border-right:none}
.live-label{font-size:9px;color:#78909C;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.live-val{font-size:20px;font-weight:900;line-height:1.1;white-space:nowrap}
.live-val.pos{color:#69F0AE}
.live-val.neg{color:#FF5252}
.live-val.neu{color:#E8EDF2}
.live-val.warn{color:#FFD740}
.live-price-inp{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:20px;font-weight:900;width:120px;padding:2px 8px;font-family:var(--font);text-align:right}
.live-price-inp:focus{outline:none;border-color:#69F0AE;background:rgba(105,240,174,.08)}
.live-price-inp::placeholder{color:#546E7A;font-size:13px}
/* 目標バー */
.target-bar-wrap{flex:1 1 200px;padding:10px 16px;display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:180px}
.target-bar-bg{height:8px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden}
.target-bar-fill{height:8px;border-radius:4px;transition:width .4s}
/* 損切りアラート */
.loss-alert{background:#B71C1C;animation:pulse .8s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.7}}
/* 次の指値パネル */
.next-price-panel{background:#FFF8E1;border:1.5px solid #FFD740;border-radius:7px;padding:8px 12px;margin-top:6px}
.next-price-row{display:flex;align-items:center;gap:8px;font-size:11px;padding:2px 0}
.np-lbl{font-weight:700;min-width:60px;font-size:10px;color:var(--sub)}
.np-price{font-weight:900;font-size:13px}
.np-buy{color:var(--blue)}
.np-sell{color:var(--red)}
.np-diff{font-size:10px;color:var(--sub);background:#F5F7FA;border-radius:3px;padding:0 5px}
/* クイック価格ボタン */
.qp-btns{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.qp-btn{font-size:10px;padding:2px 7px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;background:#FFF;color:var(--text);font-family:var(--font);font-weight:700;transition:all .1s}
.qp-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.qp-btn.qp-buy{border-color:var(--blue-md);color:var(--blue);background:var(--blue-lt)}
.qp-btn.qp-sell{border-color:var(--red-md);color:var(--red);background:var(--red-lt)}
/* 時刻バッジ */
.time-badge{font-size:9px;color:var(--muted);background:#F5F7FA;border-radius:3px;padding:0 4px;font-family:'Courier New',monospace}
/* 損切り警告 */
.sl-warning{background:#FFF3E0;border:1.5px solid #FF9800;border-radius:5px;padding:4px 8px;font-size:10px;color:var(--orange);font-weight:700;margin-top:4px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
/* ═══════════════════════ 定数 ═══════════════════════ */
/* ①-⑫: U+2460-U+246B  ⑬-⑳: U+246C-U+2473  ㉑-㉔: U+3251-U+3254 */
const NUMS=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫',
            '⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳','㉑','㉒','㉓','㉔'];
const SLOT_LABELS=['①','②','③終'];
const N_GROUPS=24;

/* ═══════════════════════ STATE ═══════════════════════ */
/*
 * ordersキー: `${YYYY-MM-DD}_${slot}` (slot=0,1,2)
 * settlesキー: 同上
 * prices[dstr]     = 終値 (③)
 * openPrices[dstr] = 始値 (①)  ← CSVから自動取得
 * ② = Math.round((始値 + 終値) / 2) 自動計算
 * slotPrices: CSVに始値がない場合の手動上書き {`${dstr}_0`: number, `${dstr}_1`: number}
 */
const S={
  year:2025,month:1,stock:'',code:'',capital:'',shares:'',
  prices:{},openPrices:{},highPrices:{},lowPrices:{},revealed:0,
  orders:{},
  settles:{},
  groups:mkGroups(),
  carries:Array.from({length:N_GROUPS},()=>[]),
  gi:0,idc:1,prOpen:false,
  sfDs:null,selPosArr:[],exitInp:'',
  revealedSlot:2,
  fixedOpen:false,jisaOpen:false,
  rule3On:true,rule3Pct:3,
  prevP:'',memo:'',fukumi:'',
  slotPrices:{},
  groupMemos:Array.from({length:N_GROUPS},()=>''),
  impStat:null,pasteText:'',
  memoSticky:true,
  memoBelow:false,    // false=右横並び / true=トレード表の下に全幅表示
  /* ── フェーズ1/2 追加フィールド ── */
  liveP:'',            // ライブ現在値（手動入力）
  dailyTarget:'',      // 今日の目標利益（円）
  maxDailyLoss:'',     // 今日の最大損失ライン（円・マイナスで入力）
  lossLockPct:3,       // 損切りライン（建値から何%）
  dashOpen:true,       // ライブダッシュ開閉
  nextPOpen:true,      // 次の指値パネル開閉
  atrMult:1.5,         // ATR倍率
  atrBasePrice:'',     // 買いAの建値（損切りライン計算用）
  atrOpen:false        // ATRパネル開閉
};

function mkGroups(){return Array.from({length:N_GROUPS},()=>({buys:[],sells:[]}))}

/* ═══════════════════════ HELPERS ═══════════════════════ */
function wds(y,m){
  const r=[],d=new Date(y,m-1,1);
  while(d.getMonth()===m-1){if(d.getDay()&&d.getDay()!==6)r.push(new Date(d));d.setDate(d.getDate()+1)}
  return r;
}
function ds(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function pad(n){return String(n).padStart(2,'0')}
function fd(s){if(!s)return '';const[,m,d]=s.split('-');return `${+m}/${+d}`}
function fn(n){if(n===''||n==null)return '';const v=Number(n);return isNaN(v)?'':v.toLocaleString('ja-JP')}
function addM6(dstr){const d=new Date(dstr);d.setMonth(d.getMonth()+6);return ds(d)}
function isExp(entryDstr,checkDstr){return checkDstr>=addM6(entryDstr)}

/* スロットキーから dstr と slot を取り出す
   dstr は "YYYY-MM-DD" で "-" を含むが "_" は含まない */
function parseSlotKey(slotKey){
  const i=slotKey.lastIndexOf('_');
  return {dstr:slotKey.substring(0,i), slot:parseInt(slotKey.substring(i+1))};
}

/* スロット価格取得
 * slot=0 → 始値 (S.openPrices[dstr] → S.slotPrices手動 → 終値フォールバック)
 * slot=1 → 中値 = round((始値+終値)/2) → 手動 → 終値フォールバック
 * slot=2 → 終値 S.prices[dstr] 固定
 */
function getSlotPrice(dstr,slot){
  const closeP=S.prices[dstr]||null;
  const openP=S.openPrices[dstr]||null;
  if(slot===2) return closeP;
  if(slot===1){
    // ② 中値 = (始値+終値)/2
    if(openP&&closeP) return Math.round((openP+closeP)/2);
    const v=S.slotPrices[`${dstr}_1`]; if(v>0) return v;
    return closeP;
  }
  // slot===0: 始値
  if(openP) return openP;
  const v=S.slotPrices[`${dstr}_0`]; if(v>0) return v;
  return closeP;
}

/* 始値データがあるかどうか */
function hasOpenPrice(){for(const _ in S.openPrices)return true;return false;}

function hasAnyPrice(){for(const _ in S.prices)return true;return false;}

/* ═══════════════════════ キャッシュ ═══════════════════════ */
let C={};

function buildCache(){
  C.days=wds(S.year,S.month);
  C.lastD=S.revealed>0?ds(C.days[S.revealed-1]):null;
  C.sh=Math.max(Number(S.shares)||1,1);
  // ライブ現在値が入力されていればそちらを優先、次に現在公開中スロットの価格
  const livePNum=parseFloat(S.liveP)||null;
  C.liveP=livePNum;
  let slotBasedP=null;
  if(C.lastD){
    const rs=S.revealedSlot??2;
    slotBasedP=getSlotPrice(C.lastD,rs)||null;
  }
  C.curP=livePNum||slotBasedP;
  C.revDstrs=new Set(C.days.slice(0,S.revealed).map(d=>ds(d)));
  C.entryMap=new Map();
  for(const g of S.groups){
    for(const e of g.buys)C.entryMap.set(e.id,e);
    for(const e of g.sells)C.entryMap.set(e.id,e);
  }
  C.open=[];
  S.groups.forEach((g,gi)=>{
    for(const e of g.buys)if(!e.settled)C.open.push({...e,gi});
    for(const e of g.sells)if(!e.settled)C.open.push({...e,gi});
  });
  C.autoStlIds=new Set();
  C.settleExitMap=new Map();
  C.settleGiMap=new Map();
  for(const ss of Object.values(S.settles)){
    for(const s of ss){
      if(s.auto)C.autoStlIds.add(s.posId);
      if(!C.settleExitMap.has(s.posId))C.settleExitMap.set(s.posId,s.exitPrice);
      if(!C.settleGiMap.has(s.posId))C.settleGiMap.set(s.posId,s.settledGi!=null?s.settledGi:-1);
    }
  }
}

function entryById(id){
  if(C.entryMap)return C.entryMap.get(id)??null;
  for(const g of S.groups){
    for(const e of g.buys)if(e.id===id)return e;
    for(const e of g.sells)if(e.id===id)return e;
  }
  return null;
}
function openEgi(){return C.open??S.groups.flatMap((g,gi)=>[...g.buys,...g.sells].filter(e=>!e.settled).map(e=>({...e,gi})))}

function calcGroupDisp(gi,type){
  const own=type==='buy'?S.groups[gi].buys:S.groups[gi].sells;
  const ownIds=new Set(own.map(e=>e.id));
  const carried=(S.carries[gi]||[]).map(id=>entryById(id)).filter(e=>e&&!ownIds.has(e.id)&&e.type===type);
  return [...carried,...own].sort((a,b)=>(b.price||0)-(a.price||0));
}

/* 1日の確定損益 (3スロット合算) */
function dayProfit(dstr){
  let t=0,any=false;
  for(let slot=0;slot<3;slot++){
    const ss=S.settles[`${dstr}_${slot}`]||[];
    for(const s of ss){
      const e=entryById(s.posId);if(!e||!e.price||!s.exitPrice)continue;
      t+=(e.type==='buy'?s.exitPrice-e.price:e.price-s.exitPrice)*C.sh;any=true;
    }
  }
  return any?t:null;
}
function monthProfit(){
  const days=C.days||wds(S.year,S.month);let t=0;
  for(const d of days){const p=dayProfit(ds(d));if(p)t+=p;}
  return t;
}

/* ═══════════════════════ 6ヶ月自動決済 ═══════════════════════ */
function checkAutoSettle(revDstr){
  const ep=S.prices[revDstr];if(!ep)return;
  const key=`${revDstr}_2`; // 自動決済はslot2（終値）
  for(const g of S.groups){
    for(const arr of[g.buys,g.sells]){
      for(const e of arr){
        if(e.settled||!isExp(e.date,revDstr))continue;
        if(!S.settles[key])S.settles[key]=[];
        if(S.settles[key].some(x=>x.posId===e.id))continue;
        S.settles[key].push({id:S.idc++,posId:e.id,exitPrice:ep,auto:true,settledGi:e.gi});
        e.settled=true;
      }
    }
  }
}

/* 期限接近ポジション */
function warnPositions(){
  if(!S.revealed||!C.days)return[];
  const lastD=C.lastD||ds(C.days[S.revealed-1]);
  const warnD=new Date(lastD);warnD.setDate(warnD.getDate()+30);
  const warnStr=ds(warnD);
  return C.open.filter(e=>addM6(e.date)<=warnStr);
}

/* グループ移行スナップショット */
function snapshotCarries(fromGi,toGi){
  if(toGi>=N_GROUPS)return;
  const ownIds=[...S.groups[fromGi].buys,...S.groups[fromGi].sells].map(e=>e.id);
  const carriedIds=S.carries[fromGi]||[];
  const allIds=[...new Set([...carriedIds,...ownIds])];
  const unsettled=allIds.filter(id=>{const e=entryById(id);return e&&!e.settled;});
  const existing=new Set(S.carries[toGi]);
  for(const id of unsettled)existing.add(id);
  S.carries[toGi]=[...existing];
}

/* ═══════════════════════ ACTIONS ═══════════════════════ */
function nowTime(){const n=new Date();return `${pad(n.getHours())}:${pad(n.getMinutes())}`}

function toggleOrder(slotKey,type){
  if(!S.orders[slotKey])S.orders[slotKey]={buyId:null,sellId:null};
  const ord=S.orders[slotKey];
  const key=type==='buy'?'buyId':'sellId';
  if(ord[key]!==null){
    rmFromGroups(ord[key]);ord[key]=null;
  } else {
    const {dstr,slot}=parseSlotKey(slotKey);
    const price=getSlotPrice(dstr,slot);
    const id=S.idc++;
    ord[key]=id;
    const g=S.groups[S.gi];
    const e={id,date:dstr,price,type,settled:false,time:nowTime()};
    if(type==='buy'){g.buys.push(e);g.buys.sort((a,b)=>(b.price||0)-(a.price||0));}
    else{g.sells.push(e);g.sells.sort((a,b)=>(b.price||0)-(a.price||0));}
  }
  R();
}

function rmFromGroups(id){
  S.groups.forEach(g=>{g.buys=g.buys.filter(e=>e.id!==id);g.sells=g.sells.filter(e=>e.id!==id)});
}

function openSF(slotKey){
  const {dstr,slot}=parseSlotKey(slotKey);
  S.sfDs=slotKey;S.selPosArr=[];
  S.exitInp=String(C.curP||getSlotPrice(dstr,slot)||'');R();
}
function closeSF(){S.sfDs=null;S.selPosArr=[];S.exitInp='';R()}
function selPosF(id){
  if(!S.selPosArr)S.selPosArr=[];
  const idx=S.selPosArr.indexOf(id);
  if(idx>=0)S.selPosArr.splice(idx,1);
  else S.selPosArr.push(id);
  R();
}

function confirmSettle(){
  const slotKey=S.sfDs;
  if(!S.selPosArr||!S.selPosArr.length){alert('ポジションを選択してください');return}
  const ep=parseFloat(S.exitInp);
  if(!ep||isNaN(ep)){alert('決済価格を入力してください');return}
  if(!S.settles[slotKey])S.settles[slotKey]=[];
  for(const posId of S.selPosArr){
    S.settles[slotKey].push({id:S.idc++,posId,exitPrice:ep,auto:false,settledGi:S.gi,time:nowTime()});
    const e=entryById(posId);if(e)e.settled=true;
  }
  S.sfDs=null;S.selPosArr=[];S.exitInp='';R();
}

function confirmSettleAll(){
  const slotKey=S.sfDs;
  const ep=parseFloat(S.exitInp);
  if(!ep||isNaN(ep)){alert('決済価格を入力してください');return}
  const open=C.open;
  if(!open.length){alert('未決済ポジションがありません');return}
  if(!S.settles[slotKey])S.settles[slotKey]=[];
  for(const e of open){
    if(e.settled)continue;
    S.settles[slotKey].push({id:S.idc++,posId:e.id,exitPrice:ep,auto:false,settledGi:S.gi,time:nowTime()});
    e.settled=true;
  }
  S.sfDs=null;S.selPosArr=[];S.exitInp='';R();
}

function rmSettle(slotKey,sid){
  const ss=S.settles[slotKey];if(!ss)return;
  const s=ss.find(x=>x.id===sid);
  if(s){const e=entryById(s.posId);if(e)e.settled=false;}
  S.settles[slotKey]=ss.filter(x=>x.id!==sid);R();
}

function reveal(){
  const days=C.days||wds(S.year,S.month);
  if(S.revealed===0){
    S.revealed=1;S.revealedSlot=0;checkAutoSettle(ds(days[0]));R();return;
  }
  if((S.revealedSlot??2)<2){S.revealedSlot=(S.revealedSlot??0)+1;R();}
  else if(S.revealed<days.length){S.revealed++;S.revealedSlot=0;checkAutoSettle(ds(days[S.revealed-1]));R();}
}
function revealAll(){
  const days=C.days||wds(S.year,S.month);
  while(S.revealed<days.length){S.revealed++;checkAutoSettle(ds(days[S.revealed-1]));}
  S.revealedSlot=2;R();
}
function advGrp(){if(S.gi<N_GROUPS-1){snapshotCarries(S.gi,S.gi+1);S.gi++;R()}}
function prevGrp(){if(S.gi>0){S.gi--;R()}}

function resetMonthData(){
  S.revealed=0;S.revealedSlot=2;S.orders={};S.settles={};S.groups=mkGroups();
  S.carries=Array.from({length:N_GROUPS},()=>[]);
  S.groupMemos=Array.from({length:N_GROUPS},()=>'');
  S.slotPrices={};S.gi=0;S.idc=1;
  // ※ prices/openPrices はリセットしない（月またぎで共有）
}
function resetMonth(){resetMonthData();R();}

/* ═══════════════════════ IMPORT ═══════════════════════ */
function parseDate(s){
  if(!s)return null;s=String(s).trim();
  if(/^\d{5}$/.test(s)){const d=new Date((+s-25569)*86400000);if(!isNaN(d))return ds(d);}
  let m=s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
  if(m)return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}`;
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return `${m[3]}-${pad(+m[1])}-${pad(+m[2])}`;
  m=s.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if(m)return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}`;
  m=s.match(/^(\d{4})(\d{2})(\d{2})$/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
}
function parsePriceStr(s){
  if(s==null||s==='')return null;
  const v=parseFloat(String(s).replace(/,/g,''));return isNaN(v)?null:v;
}
function parseImportText(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  const results=[],errs=[];
  for(let i=0;i<lines.length;i++){
    const ln=lines[i];
    const sep=ln.includes('\t')?'\t':',';
    const cols=ln.split(sep).map(c=>c.trim().replace(/^"|"$/g,''));
    if(cols.length<2)continue;
    let dstr=null;
    let nums=[]; // 日付列以降の数値を順に収集
    for(let ci=0;ci<Math.min(cols.length,4);ci++){
      const d=parseDate(cols[ci]);
      if(d){
        dstr=d;
        // 日付列の後ろから最大6個の数値列を収集
        for(let pi=ci+1;pi<Math.min(cols.length,ci+7);pi++){
          const p=parsePriceStr(cols[pi]);
          if(p&&p>0) nums.push(p);
        }
        break;
      }
    }
    if(!dstr||!nums.length){if(i<5)continue;errs.push(`行${i+1}: "${ln.substring(0,40)}" → 解析不可`);continue;}

    let open=null,high=null,low=null,close=null;
    if(nums.length>=4){
      // OHLC形式: 始値,高値,安値,終値[,出来高...]
      open=nums[0]; high=nums[1]; low=nums[2]; close=nums[3];
    } else if(nums.length===3){
      open=nums[0]; close=nums[2];
    } else if(nums.length===2){
      open=nums[0]; close=nums[1];
    } else {
      close=nums[0];
    }
    results.push({date:dstr,open,high,low,close});
  }
  return {results,errs};
}
function applyImportData(results){
  let cnt=0;
  for(const r of results){
    if(r.date&&r.close>0){
      S.prices[r.date]=r.close;
      if(r.open&&r.open>0) S.openPrices[r.date]=r.open;
      if(r.high&&r.high>0) S.highPrices[r.date]=r.high;
      if(r.low&&r.low>0)   S.lowPrices[r.date]=r.low;
      cnt++;
    }
  }
  return cnt;
}
function handleCSVFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const {results,errs}=parseImportText(text);
    const cnt=applyImportData(results);
    const hasOpen=results.some(r=>r.open);
    const preview=results.slice(0,5).map(r=>({date:r.date,open:r.open,close:r.close}));
    S.impStat=cnt===0
      ?{type:'err',msg:'データを読み取れませんでした。',count:0,preview:[],hasOpen:false}
      :{type:errs.length?'warn':'ok',
        msg:`${cnt}件のデータを読み込みました${hasOpen?' (始値・終値)':'（終値のみ）'}${errs.length?' ／'+errs.length+'行スキップ':''}`,
        count:cnt,preview,hasOpen};
    S.prOpen=true;
    R();
  };
  reader.readAsText(file,'UTF-8');
}
function applyPasteText(){
  const text=S.pasteText;
  if(!text.trim()){S.impStat={type:'err',msg:'テキストを入力してください',count:0,preview:[]};R();return;}
  const {results,errs}=parseImportText(text);
  const cnt=applyImportData(results);
  const hasOpen=results.some(r=>r.open);
  const preview=results.slice(0,5);
  S.impStat=cnt===0
    ?{type:'err',msg:'データを解析できませんでした。',count:0,preview:[],hasOpen:false}
    :{type:errs.length?'warn':'ok',
      msg:`${cnt}件のデータを取り込みました${hasOpen?' (始値・終値)':'（終値のみ）'}${errs.length?' ／'+errs.length+'行スキップ':''}`,
      count:cnt,preview,hasOpen};
  S.prOpen=true;
  R();
}
function handleDrop(e){e.preventDefault();const file=e.dataTransfer.files[0];if(file)handleCSVFile(file);}

/* ═══════════════════════ LOCAL STORAGE ═══════════════════════ */
const LS_PRE='katotre3s_'; // 3スロット版は別プレフィックス
const LS_PRICES=LS_PRE+'prices';
const LS_META=LS_PRE+'meta';
function lsKey(y,m){return LS_PRE+y+'_'+String(m).padStart(2,'0');}

function lsSave(){
  try{
    const md={revealed:S.revealed,revealedSlot:S.revealedSlot??2,orders:S.orders,settles:S.settles,
      groups:S.groups,carries:S.carries,gi:S.gi,idc:S.idc,
      groupMemos:S.groupMemos,slotPrices:S.slotPrices};
    localStorage.setItem(lsKey(S.year,S.month),JSON.stringify(md));
    // prices と openPrices を1つのオブジェクトに格納
    localStorage.setItem(LS_PRICES,JSON.stringify({prices:S.prices,openPrices:S.openPrices,highPrices:S.highPrices,lowPrices:S.lowPrices}));
    localStorage.setItem(LS_META,JSON.stringify({
      stock:S.stock,code:S.code,capital:S.capital,shares:S.shares,
      prevP:S.prevP,memo:S.memo,fukumi:S.fukumi,
      rule3On:S.rule3On,rule3Pct:S.rule3Pct,year:S.year,month:S.month,
      liveP:S.liveP,dailyTarget:S.dailyTarget,maxDailyLoss:S.maxDailyLoss,lossLockPct:S.lossLockPct
    }));
  }catch(e){console.warn('save err',e);}
}
function lsLoadMonth(y,m){
  try{
    const raw=localStorage.getItem(lsKey(y,m));if(!raw)return false;
    const d=JSON.parse(raw);
    S.revealed=d.revealed||0;S.revealedSlot=d.revealedSlot!==undefined?d.revealedSlot:2;S.orders=d.orders||{};S.settles=d.settles||{};
    S.groups=d.groups||mkGroups();
    S.carries=d.carries||Array.from({length:N_GROUPS},()=>[]);
    S.gi=d.gi||0;S.idc=d.idc||1;
    S.groupMemos=d.groupMemos||Array.from({length:N_GROUPS},()=>'');
    S.slotPrices=d.slotPrices||{};
    // 旧データのcarries/groupMemosが12個だった場合に拡張
    while(S.carries.length<N_GROUPS)S.carries.push([]);
    while(S.groupMemos.length<N_GROUPS)S.groupMemos.push('');
    return true;
  }catch(e){return false;}
}
function lsLoadPrices(){
  try{
    const r=localStorage.getItem(LS_PRICES);if(!r)return;
    const d=JSON.parse(r);
    // 新形式: {prices:{...}, openPrices:{...}}
    // 旧形式: {dstr:price, ...} (フラットオブジェクト)
    if(d.prices){
      S.prices=d.prices||{};
      S.openPrices=d.openPrices||{};
      S.highPrices=d.highPrices||{};
      S.lowPrices=d.lowPrices||{};
    } else {
      S.prices=d;
      S.openPrices={};
      S.highPrices={};
      S.lowPrices={};
    }
  }catch(e){}
}
function lsLoadMeta(){
  try{
    const r=localStorage.getItem(LS_META);if(!r)return;
    const d=JSON.parse(r);
    S.stock=d.stock||'';S.code=d.code||'';S.capital=d.capital||'';S.shares=d.shares||'';
    S.prevP=d.prevP||'';S.memo=d.memo||'';S.fukumi=d.fukumi||'';
    if(d.rule3On!==undefined)S.rule3On=d.rule3On;
    if(d.rule3Pct)S.rule3Pct=d.rule3Pct;
    if(d.year)S.year=d.year;if(d.month)S.month=d.month;
    if(d.liveP!==undefined)S.liveP=d.liveP;
    if(d.dailyTarget!==undefined)S.dailyTarget=d.dailyTarget;
    if(d.maxDailyLoss!==undefined)S.maxDailyLoss=d.maxDailyLoss;
    if(d.lossLockPct)S.lossLockPct=d.lossLockPct;
  }catch(e){}
}
function lsClearMonth(y,m){
  if(!confirm(y+'年'+m+'月のデータを消去しますか？'))return;
  localStorage.removeItem(lsKey(y,m));resetMonthData();R();
}
function lsClearAll(){
  if(!confirm('全データを消去しますか？この操作は元に戻せません。'))return;
  Object.keys(localStorage).filter(k=>k.startsWith(LS_PRE)).forEach(k=>localStorage.removeItem(k));
  location.reload();
}
function lsSavedList(){
  return Object.keys(localStorage)
    .filter(k=>k.startsWith(LS_PRE)&&k!==LS_PRICES&&k!==LS_META)
    .map(k=>{const p=k.replace(LS_PRE,'').split('_');return{y:+p[0],m:+p[1]};})
    .sort((a,b)=>a.y!==b.y?a.y-b.y:a.m-b.m);
}
function rSavedList(){
  const list=lsSavedList();
  if(!list.length)return '<span style="color:var(--muted)">なし</span>';
  return list.map(x=>{
    const cur=x.y===S.year&&x.m===S.month;
    return `<span class="saved-tag ${cur?'cur':''}" onclick="S.year=${x.y};S.month=${x.m};lsLoadMonth(${x.y},${x.m})||resetMonthData();R()">${x.y}/${x.m}</span>`;
  }).join(' ');
}

/* ═══════════════════════ RENDER ═══════════════════════ */
let _saveTimer=null;
function R(){
  buildCache();
  const rightPanel=document.querySelector('.right-panel');
  const savedScroll=rightPanel?rightPanel.scrollTop:0;
  document.getElementById('app').innerHTML=rApp();
  const newRightPanel=document.querySelector('.right-panel');
  if(newRightPanel&&savedScroll)newRightPanel.scrollTop=savedScroll;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(lsSave,400);
}

function rApp(){
  const days=C.days;
  const warns=warnPositions();
  const lastDs_=C.lastD;

  const memoBlock=`<div class="memo-sticky${S.memoSticky&&!S.memoBelow?'':' no-sticky'}">${rMemo()}</div>`;

/* ─── ライブダッシュボード（フェーズ1/2） ─── */
function calcFukumi(){
  // 全グループの未決済ポジションの含み損益合計
  const curP=C.curP;const sh=C.sh;
  if(!curP)return null;
  let total=0,cnt=0;
  for(const g of S.groups){
    for(const e of [...g.buys,...g.sells]){
      if(e.settled||!e.price)continue;
      total+=(e.type==='buy'?curP-e.price:e.price-curP)*sh;
      cnt++;
    }
  }
  return cnt>0?{val:total,cnt}:null;
}

function calcTodaySettled(){
  // 本日日付（ライブ想定: 最後に公開した日）の確定損益
  const lastD=C.lastD;if(!lastD)return 0;
  const sh=C.sh;let t=0;
  for(let slot=0;slot<3;slot++){
    const ss=S.settles[`${lastD}_${slot}`]||[];
    for(const s of ss){
      const e=entryById(s.posId);if(!e||!e.price||!s.exitPrice)continue;
      t+=(e.type==='buy'?s.exitPrice-e.price:e.price-s.exitPrice)*sh;
    }
  }
  return Math.round(t);
}

function calcNextPrices(){
  // 現在の未決済ポジション群から「次に追加できる価格」を計算
  const curP=C.curP;
  if(!curP||!S.rule3On)return null;
  const open=C.open;
  const buys=open.filter(e=>e.type==='buy'&&e.price);
  const sells=open.filter(e=>e.type==='sell'&&e.price);
  const pct=S.rule3Pct||3;

  function nextBuy(){
    if(!buys.length)return {price:curP,label:'制限なし（初回）'};
    const lowestBuy=Math.min(...buys.map(e=>e.price));
    const threshold=calcThreshold(lowestBuy,pct);
    const nextP=lowestBuy-threshold;
    return {price:Math.round(nextP),diff:Math.round(curP-nextP),ok:curP<=nextP,label:`最安買値${fn(lowestBuy)}円 −${fn(threshold)}円`};
  }
  function nextSell(){
    if(!sells.length)return {price:curP,label:'制限なし（初回）'};
    const highestSell=Math.max(...sells.map(e=>e.price));
    const threshold=calcThreshold(highestSell,pct);
    const nextP=highestSell+threshold;
    return {price:Math.round(nextP),diff:Math.round(nextP-curP),ok:curP>=nextP,label:`最高売値${fn(highestSell)}円 +${fn(threshold)}円`};
  }
  return {buy:nextBuy(),sell:nextSell()};
}

function calcLossLock(){
  // 損切りライン：各未決済ポジションが建値からlossLockPct%動いたときの損失
  const sh=C.sh;const pct=S.lossLockPct||3;
  const open=C.open;if(!open.length)return null;
  const items=open.filter(e=>e.price).map(e=>{
    const lossPrice=e.type==='buy'
      ?Math.round(e.price*(1-pct/100))
      :Math.round(e.price*(1+pct/100));
    const lossAmt=Math.round(Math.abs(lossPrice-e.price)*sh);
    return{...e,lossPrice,lossAmt};
  });
  const totalLoss=-items.reduce((s,e)=>s+e.lossAmt,0);
  return{items,totalLoss};
}

  const statH=stat?`<div class="imp-stat ${stat.type}" style="margin-top:8px">
    ${stat.type==='ok'?'✅':stat.type==='warn'?'⚠️':'❌'} ${stat.msg}

  return `<div class="cb" style="padding:12px 14px">
    <div class="imp-hint">

/* ─── スロット別利益 ─── */
function slotProfit(dstr,slot){
  const ss=S.settles[`${dstr}_${slot}`]||[];
  let t=0,any=false;
  for(const s of ss){
    const e=entryById(s.posId);if(!e||!e.price||!s.exitPrice)continue;
    t+=(e.type==='buy'?s.exitPrice-e.price:e.price-s.exitPrice)*C.sh;any=true;
  }
  return any?t:null;
}

/* ─── トレードテーブル（1日×3スロット） ─── */
function rTable(days){
  const filtered=hasAnyPrice()?days.filter(d=>S.prices[ds(d)]):days;
  const revDstrs=C.revDstrs;
  const rows=[];

  filtered.forEach((d,di)=>{
    const dstr=ds(d);
    const isInRevSet=revDstrs.has(dstr);
    const isCurrentDay=dstr===C.lastD;
    const isPastDay=isInRevSet&&!isCurrentDay;
    const dayFullyRev=isPastDay||(isCurrentDay&&(S.revealedSlot??2)>=2);
    const closePrice=S.prices[dstr]||null;
    const prevDstr=di>0?ds(filtered[di-1]):null;
    const prevClose=prevDstr?(S.prices[prevDstr]||null):null;
    const prevRev=prevDstr?revDstrs.has(prevDstr):false;

    // この日にいずれかのスロットで自動決済があるか
    const hasAuto=[0,1,2].some(sl=>(S.settles[`${dstr}_${sl}`]||[]).some(s=>s.auto));
    // 日合計利益（slot2行にサマリー）
    const dayPr=dayFullyRev?dayProfit(dstr):null;
    let dayPrH='';
    if(dayPr!==null){
      const cl=dayPr>0?'ppos':dayPr<0?'pneg':'';
      const sh_=C.sh;
      const perShare=sh_>1?Math.round(dayPr/sh_):null;
      dayPrH=`<span class="${cl}" style="font-size:11px;font-weight:700">${dayPr>0?'+':''}${fn(Math.round(dayPr))}円</span>`
        +(perShare!==null?`<br><span style="font-size:9px;color:var(--sub)">(1株${perShare>0?'+':''}${fn(perShare)})</span>`:'');
    }

    for(let slot=0;slot<3;slot++){
      const slotKey=`${dstr}_${slot}`;
      const revSlot=isPastDay||(isCurrentDay&&slot<=(S.revealedSlot??2));
      const price=getSlotPrice(dstr,slot);
      const isLast=slot===2;

      const ord=S.orders[slotKey]||{};
      const bo=ord.buyId!=null;
      const so=ord.sellId!=null;
      const ryodate=bo&&so;
      const boSettled=bo&&(entryById(ord.buyId)?.settled===true);
      const soSettled=so&&(entryById(ord.sellId)?.settled===true);

      let dfH='';
      if(revSlot){
        let dfVal=null;
        if(slot===0){
          // ① 今日始値 - 前日終値
          const todayOpen=getSlotPrice(dstr,0);
          const prevClose=prevDstr?getSlotPrice(prevDstr,2):null;
          if(todayOpen&&prevClose&&prevRev) dfVal=todayOpen-prevClose;
        } else if(slot===1){
          // ② 今日中値 - 今日始値
          const todayMid=getSlotPrice(dstr,1);
          const todayOpen=getSlotPrice(dstr,0);
          if(todayMid&&todayOpen) dfVal=todayMid-todayOpen;
        } else {
          // ③ 今日終値 - 今日中値
          const todayClose=getSlotPrice(dstr,2);
          const todayMid=getSlotPrice(dstr,1);
          if(todayClose&&todayMid) dfVal=todayClose-todayMid;
        }
        if(dfVal!==null){
          const cl=dfVal>0?'up':dfVal<0?'dn':'';
          dfH=`<span class="${cl}">${dfVal>0?'+':''}${fn(Math.round(dfVal))}</span>`;
        }
      }

      // ─ 価格表示 ─
      let priceH='';
      if(revSlot){
        if(slot===2){
          // ③終値：常に固定表示
          priceH=`<span style="font-weight:700">${closePrice?fn(closePrice):'—'}</span>`;
        } else if(S.openPrices[dstr]){
          // 始値データあり → 自動計算値を表示（非入力）
          const autoP=price;
          const labelColor=slot===0?'var(--blue)':'var(--purple)';
          priceH=`<span style="font-weight:700;color:${labelColor}">${autoP?fn(autoP):'—'}</span>`;
        } else {
          // 始値データなし → 手動入力（空欄=終値と同価格）
          const storedV=S.slotPrices[slotKey];
          priceH=`<input type="number" class="slot-p-inp"
            value="${storedV>0?storedV:''}"
            placeholder="${closePrice||'価格'}"
            title="${slot===0?'始値を手入力（空欄=終値）':'中値を手入力（空欄=終値）'}"
            oninput="S.slotPrices['${slotKey}']=parseFloat(this.value)||null">`;
        }
      } else {
        priceH=`<span class="ph">${closePrice?fn(closePrice):'——'}</span>`;
      }

      // 日区切り下線（slot2最終行）
      const endBorder=isLast?'border-bottom:2px solid #90A4AE!important':'';

      let row=`<tr class="${ryodate?'row-ryodate':''}">`;

      // 日付セル（slot0のみ、rowspan=3）
      if(slot===0){
        row+=`<td class="cd" rowspan="3" style="vertical-align:middle;font-weight:700">
          ${fd(dstr)}
          ${hasAuto?`<span class="expiry-warn">⚠自動</span>`:''}
        </td>`;
      }

      row+=`
        <td class="csl" style="color:var(--sub);font-size:10px;${endBorder}">${SLOT_LABELS[slot]}</td>
        <td class="cp" style="${endBorder}">${priceH}</td>
        <td class="cdf" style="${endBorder}">${dfH}</td>
        <td class="cob" style="${endBorder}">
          ${revSlot?`<button class="ord-btn ${bo?'ob':''}" onclick="toggleOrder('${slotKey}','buy')"
            style="${boSettled?'text-decoration:line-through;opacity:.5':''}">${bo?'○':''}</button>
          ${!bo?r3pctAlert(dstr,slot,'buy'):'<div style="font-size:8px;height:14px"></div>'}`:''}
        </td>
        <td class="cos" style="${endBorder}">
          ${revSlot?`<button class="ord-btn ${so?'os':''}" onclick="toggleOrder('${slotKey}','sell')"
            style="${soSettled?'text-decoration:line-through;opacity:.5':''}">${so?'×':''}</button>
          ${!so?r3pctAlert(dstr,slot,'sell'):'<div style="font-size:8px;height:14px"></div>'}`:''}
        </td>
        <td class="cs" style="${endBorder}">${rSettleCell(slotKey,revSlot,price)}</td>
        <td class="cpr" style="${endBorder}">${(()=>{
          const sp=slotProfit(dstr,slot);
          if(sp!==null){
            const cl=sp>0?'ppos':sp<0?'pneg':'';
            return `<span class="${cl}" style="font-size:11px;font-weight:700">${sp>0?'+':''}${fn(Math.round(sp))}円</span>`;
          }
          return '';
        })()}</td>
      </tr>`;

      rows.push(row);
    }
  });

  const hiddenCount=hasAnyPrice()?days.length-filtered.length:0;
  const hiddenNote=hiddenCount>0
    ?`<div style="font-size:10px;color:var(--sub);padding:4px 10px;background:#FAFBFC;border-top:1px solid var(--border)">
        ※ 終値データなし ${hiddenCount}日は非表示（祝日・データ欠損等）
       </div>`:'';

  return `<table class="trade">
    <thead><tr>
      <th class="cd">日付</th>
      <th class="csl">回</th>
      <th class="cp">価格</th>
      <th class="cdf" title="①前日比 ②始→中 ③中→終">差</th>
      <th class="cob">○買</th>
      <th class="cos">×売</th>
      <th class="cs">決済ポジション</th>
      <th class="cpr">利益幅(円)</th>
    </tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>${hiddenNote}`;
}

/* ─── 最高値・最安値 ─── */
function rHighLow(days){
  const revDstrs=new Set(days.slice(0,S.revealed).map(d=>ds(d)));
  const mPrices=[];
  revDstrs.forEach(dstr=>{if(S.prices[dstr])mPrices.push({dstr,price:S.prices[dstr]});});
  if(!mPrices.length)return '';
  mPrices.sort((a,b)=>b.price-a.price);
  const mHi=mPrices[0],mLo=mPrices[mPrices.length-1];
  let allHi=null,allLo=null;
  try{
    const revealedDstrs=new Set();revDstrs.forEach(d=>revealedDstrs.add(d));
    lsSavedList().forEach(x=>{
      if(x.y===S.year&&x.m===S.month)return;
      const raw=localStorage.getItem(lsKey(x.y,x.m));if(!raw)return;
      const md=JSON.parse(raw);const mDays=wds(x.y,x.m);const mRev=md.revealed||0;
      mDays.slice(0,mRev).forEach(d=>{revealedDstrs.add(ds(d));});
    });
    const allPrices=[];
    revealedDstrs.forEach(dstr=>{if(S.prices[dstr])allPrices.push({dstr,price:S.prices[dstr]});});
    if(allPrices.length){
      allPrices.sort((a,b)=>b.price-a.price);
      allHi=allPrices[0];allLo=allPrices[allPrices.length-1];
    }
  }catch(e){}
  const showAll=allHi&&allLo&&(allHi.price!==mHi.price||allLo.price!==mLo.price);

  // ATR計算
  const atr=calcATR(14);
  const hasHL=Object.keys(S.highPrices).length>0;
  const mult=S.atrMult||1.5;
  const slide=atr?Math.round(atr*mult):null;
  const stopLoss=slide?Math.round(slide/2):null;
  const baseP=parseFloat(S.atrBasePrice)||null;
  const multOptions=[1.0,1.5,2.0];

  // 自動おすすめ倍率（ATR÷現在値の割合で判断）
  let recMult=null;
  if(atr&&C.curP){
    const atrPct=atr/C.curP*100;
    if(atrPct<1.0) recMult=2.0;
    else if(atrPct<2.0) recMult=1.5;
    else recMult=1.0;

  const atrSection=`<div style="padding:5px 14px;background:#FFF8E1;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:220px">
    <div style="font-size:10px;font-weight:700;color:var(--warn)">📐 ATR14${hasHL?'':' ※近似'} &nbsp;
      ${atr?`<span style="font-size:14px;font-weight:900;color:var(--orange)">${fn(atr)}円</span>`:'<span style="font-size:10px;color:var(--sub)">データ不足</span>'}
    </div>
    ${atr?`
    <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
      ${multOptions.map(m=>{
        const sw=Math.round(atr*m);
        const isSel=mult===m;
        const isRec=recMult===m;
        return `<button style="font-size:10px;padding:1px 7px;border-radius:4px;border:1.5px solid ${isSel?'var(--orange)':'var(--border)'};background:${isSel?'var(--orange)':'#fff'};color:${isSel?'#fff':'var(--sub)'};cursor:pointer;font-weight:700;position:relative"
          onclick="S.atrMult=${m};R()">${m}倍 <b>${fn(sw)}</b>円${isRec?'<span style="position:absolute;top:-8px;right:-4px;font-size:8px;background:var(--green);color:#fff;border-radius:3px;padding:0 3px;font-weight:700">推奨</span>':''}</button>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:var(--sub);display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span>損切り幅 <b style="color:var(--red)">${fn(stopLoss)}円</b></span>
      <span style="color:var(--muted)">｜</span>
      <span>建値
        <input type="number" style="width:68px;font-size:10px;padding:1px 4px;border:1px solid var(--border);border-radius:3px;margin:0 2px"
          value="${S.atrBasePrice||''}" placeholder="例:1770"
          oninput="S.atrBasePrice=this.value;R()">円
        ${baseP?`<b style="color:var(--red)"> → ${fn(Math.round(baseP-stopLoss))}円で全決済</b>`:''}
      </span>
    </div>`:''}
  </div>`;

  return `<div class="card">
    <div style="display:flex;flex-wrap:wrap;align-items:stretch;gap:0">
      <div style="padding:5px 14px;background:#FFF5F5;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:3px">
        <div style="font-size:10px;font-weight:700;color:var(--sub)">📅 月間</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:10px;color:var(--red)">最高</span>
          <span style="font-size:15px;font-weight:700;color:var(--red)">${fn(mHi.price)}円</span>
          <span style="font-size:10px;color:var(--sub)">${fd(mHi.dstr)}</span>
          <span style="font-size:10px;color:var(--sub);margin:0 4px">／</span>
          <span style="font-size:10px;color:var(--blue)">最安</span>
          <span style="font-size:15px;font-weight:700;color:var(--blue)">${fn(mLo.price)}円</span>
          <span style="font-size:10px;color:var(--sub)">${fd(mLo.dstr)}</span>
          ${mHi.price!==mLo.price?`<span style="font-size:10px;color:var(--sub);margin-left:6px">値幅 <b>${fn(mHi.price-mLo.price)}円</b></span>`:''}
        </div>
      </div>
      ${showAll?`<div style="padding:5px 14px;background:#F5F9FF;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:3px">
        <div style="font-size:10px;font-weight:700;color:var(--sub)">📊 全期間</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:10px;color:var(--red)">最高</span>
          <span style="font-size:15px;font-weight:700;color:var(--red)">${fn(allHi.price)}円</span>
          <span style="font-size:10px;color:var(--sub)">${allHi.dstr}</span>
          <span style="font-size:10px;color:var(--sub);margin:0 4px">／</span>
          <span style="font-size:10px;color:var(--blue)">最安</span>
          <span style="font-size:15px;font-weight:700;color:var(--blue)">${fn(allLo.price)}円</span>
          <span style="font-size:10px;color:var(--sub)">${allLo.dstr}</span>
          <span style="font-size:10px;color:var(--sub);margin-left:6px">値幅 <b>${fn(allHi.price-allLo.price)}円</b></span>
        </div>
      </div>`:''}
      ${atrSection}
    </div>
  </div>`;
}

/* ─── ルール間隔判定 ─── */
function calcThreshold(basePrice,pct){
  const mag=Math.pow(10,Math.floor(Math.log10(basePrice)));
  return Math.round(Math.floor(basePrice/mag)*mag*(pct/100));
}
function checkRulePct(dstr,slot,type){
  if(!S.rule3On)return null;
  const same=(C.open||openEgi()).filter(e=>e.type===type&&e.price);
  if(!same.length)return null;
  const curP=getSlotPrice(dstr,slot);
  if(!curP)return null;
  const pct=S.rule3Pct||3;
  let ngBase=null,ngDiff=null,ngNeed=null;
  for(const e of same){
    const base=e.price,threshold=calcThreshold(base,pct),diff=Math.abs(curP-base);
    if(diff<threshold&&(ngBase===null||diff<ngDiff)){ngBase=base;ngDiff=Math.round(diff);ngNeed=threshold;}
  }
  if(ngBase!==null)return{ok:false,base:ngBase,curP,diff:ngDiff,need:ngNeed};
  const closest=same.reduce((a,b)=>Math.abs((b.price||0)-curP)<Math.abs((a.price||0)-curP)?b:a);
  const base=closest.price,diff=Math.round(Math.abs(curP-base)),need=calcThreshold(base,pct);
  return{ok:true,base,curP,diff,need};
}
function r3pctAlert(dstr,slot,type){
  if(!(C.revDstrs||new Set()).has(dstr))return '';
  const r=checkRulePct(dstr,slot,type);if(!r)return '';
  if(r.ok)return `<div style="font-size:8px;color:#0057B8;font-weight:700;line-height:1.2">+${fn(r.diff)}円</div>`;
  return `<div style="font-size:8px;color:#C62828;font-weight:700;line-height:1.2">-${fn(r.need-r.diff)}円</div>`;
}

/* ─── 決済セル ─── */
function rSettleCell(slotKey,rev,curPrice){
  const ss=S.settles[slotKey]||[];
  const sh=C.sh;
  const list=ss.map(s=>{
    const e=entryById(s.posId);if(!e)return '';
    const tCl=e.type==='buy'?'tb':'ts',tLb=e.type==='buy'?'○':'×';
    const pr=e.price&&s.exitPrice?(e.type==='buy'?s.exitPrice-e.price:e.price-s.exitPrice)*sh:null;
    const prStr=pr!==null?`<span class="${pr>=0?'ppos':'pneg'}" style="font-size:10px">${pr>=0?'+':''}${fn(Math.round(pr))}円</span>`:'';
    return `<div class="si ${s.auto?'auto-si':''}">
      ${s.auto?`<span class="auto-tag">⚠6ヶ月期限</span>`:''}
      <span class="${tCl}">${tLb}</span>
      <span>${fd(e.date)}</span>
      <span style="color:var(--sub)">${e.price?fn(e.price):'-'}</span>→
      <span style="font-weight:700">${fn(s.exitPrice)}</span>
      ${prStr}
      <button class="brm" onclick="rmSettle('${slotKey}',${s.id})" title="削除">✕</button>
    </div>`;
  }).join('');
  const open=C.open;

  return `<div>
    <div class="sl">${list}</div>
    ${canAdd?`<button class="btn btn-blue btn-xs" style="margin-top:2px" onclick="openSF('${slotKey}')">＋ 決済追加</button>`:''}
    ${formOpen?rSettleForm(slotKey,curPrice):''}
  </div>`;
}

/* ─── 決済フォーム ─── */
function rSettleForm(slotKey,curPrice){
  const lastD=C.lastD;const open=C.open;const sh_sf=C.sh;
  const {dstr,slot}=parseSlotKey(slotKey);
  const sortedOpen=[...open].sort((a,b)=>(b.price||0)-(a.price||0));
  const selArr=S.selPosArr||[];
  const selCount=selArr.length;

  const pItems=sortedOpen.map(e=>{
    const tCl=e.type==='buy'?'tb':'ts',tLb=e.type==='buy'?'○':'×';
    const isSel=selArr.includes(e.id);
    const isExpired=lastD&&isExp(e.date,lastD);
    const expStr=isExpired
      ?`<span style="color:var(--red);font-size:9px;font-weight:700">⚠期限超過</span>`
      :`<span style="font-size:9px;color:var(--sub)">期限:${fd(addM6(e.date))}</span>`;
    let plH='';
    if(e.price&&curPrice){
      const pl=Math.round((e.type==='buy'?curPrice-e.price:e.price-curPrice)*sh_sf);
      const plCl=pl>0?'ppos':pl<0?'pneg':'';
      plH=`<span class="${plCl}" style="font-size:10px;font-weight:700;min-width:58px;text-align:right">${pl>=0?'+':''}${fn(pl)}円</span>`;
    }
    return `<div class="pi2 ${isSel?'sel':''} ${isExpired?'expiring':''}" onclick="selPosF(${e.id})" style="${isSel?'outline:2px solid var(--blue);':''}">
      <span style="font-size:11px;margin-right:2px">${isSel?'☑':'☐'}</span>
      <span class="${tCl}">${tLb}</span>
      <span>${fd(e.date)}</span>
      <span>${e.price?fn(e.price)+'円':'—'}</span>
      ${expStr}
      <span style="font-size:9px;color:var(--muted)">${NUMS[e.gi]}</span>
      ${e.time?`<span class="time-badge">${e.time}</span>`:''}
      ${plH}
    </div>`;
  }).join('');

  // クイック価格ボタン
  const qPrices=[];
  if(curPrice) qPrices.push({label:`現在値 ${fn(curPrice)}`,val:curPrice,cls:''});
  for(let sl=0;sl<3;sl++){
    const p=getSlotPrice(dstr,sl);
    if(p&&!qPrices.some(q=>q.val===p))
      qPrices.push({label:`${SLOT_LABELS[sl]} ${fn(p)}`,val:p,cls:sl===0?'qp-buy':sl===2?'':'qp-sell'});
  }
  if(selCount===1){
    const se=entryById(selArr[0]);
    if(se&&se.price&&!qPrices.some(q=>q.val===se.price))

  }

/* ─── ポジションメモ（24グループ） ─── */
function rMemo(){
  const lastD=C.lastD;const sh=C.sh;
  const autoStlIds=C.autoStlIds;

  const gcards=S.groups.map((g,gi)=>{
    const isCur=gi===S.gi;
    const dispB=calcGroupDisp(gi,'buy').slice(0,7);
    const dispS=calcGroupDisp(gi,'sell').slice(0,7);
    const allDisp=[...dispB,...dispS];
    const ownAll=[...S.groups[gi].buys,...S.groups[gi].sells];
    const isDone=ownAll.length>0&&allDisp.every(e=>e.settled);

    // 買い・売りを価格降順でマージ（最大7行）
    const rows=[];
    let bi=0,si=0;
    while(rows.length<7&&(bi<dispB.length||si<dispS.length)){
      const bp=bi<dispB.length?(dispB[bi].price||0):null;
      const sp=si<dispS.length?(dispS[si].price||0):null;
      if(bp!==null&&sp!==null&&bp===sp){rows.push({buy:dispB[bi++],sell:dispS[si++]});}
      else if(bp!==null&&(sp===null||bp>sp)){rows.push({buy:dispB[bi++],sell:null});}
      else{rows.push({buy:null,sell:dispS[si++]});}
    }
    while(rows.length<7)rows.push({buy:null,sell:null});

    const mkCell=(e,colType)=>{
      if(!e)return '<div class="ge"></div>';
      const isExpired=lastD&&isExp(e.date,lastD);
      const isAutoStl=e.settled&&autoStlIds.has(e.id);
      const isOwnGi=e.settled&&C.settleGiMap&&C.settleGiMap.get(e.id)===gi;
      let fukumiH='';
      if(e.price){
        let refP=null;
        if(e.settled&&isOwnGi){refP=C.settleExitMap&&C.settleExitMap.get(e.id)||null;}
        else if(!e.settled&&C.curP){refP=C.curP;}
        if(refP){
          const diff=colType==='buy'?refP-e.price:e.price-refP;
          const val=Math.round(diff*sh);const cl=val>0?'ppos':val<0?'pneg':'';
          fukumiH=`<div class="ge-fukumi ${cl}">(${val>0?'+':''}${fn(val)})</div>`;
        }
      }
      return `<div class="ge has ${e.settled&&isOwnGi?'stl':''} ${isAutoStl&&isOwnGi?'auto-stl':''} ${colType}-e">
        <div class="ged">${fd(e.date)}</div>
        <div class="gep">${e.price?fn(e.price):'—'}</div>
        ${fukumiH}
        ${!e.settled&&isExpired?'<div class="ge-exp">⚠期限超過</div>':''}
      </div>`;
    };

    const rowsH=rows.map(r=>`<div class="ge-row">
      <div class="gcol">${mkCell(r.buy,'buy')}</div>
      <div class="gcol">${mkCell(r.sell,'sell')}</div>
    </div>`).join('');

    return `<div class="gc ${isCur?'cur':''} ${isDone?'done':''}">
      <div class="gh">
        <span>${NUMS[gi]}</span>
        <span style="display:flex;gap:3px;align-items:center">
          ${isCur?'<span class="badge badge-orange">現在</span>':''}
          ${isDone?'<span class="badge badge-green">済</span>':''}
        </span>
      </div>
      <div class="gc-cols">
        <div class="gch buy">○買い</div>
        <div class="gch sell">×売り</div>
      </div>
      ${rowsH}
      <div style="padding:2px 5px;border-top:1px solid var(--border)">
        <textarea style="width:100%;font-size:10px;border:1px solid var(--border);border-radius:3px;padding:2px 4px;background:#FAFBFC;resize:none;overflow:hidden;line-height:1.4;min-height:22px"
          placeholder="メモ..."
          oninput="S.groupMemos[${gi}]=this.value;this.style.height='auto';this.style.height=this.scrollHeight+'px'"
          onfocus="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        >${(S.groupMemos[gi]||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      </div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="memo-top">
      <div class="memo-title">
        📋 ポジションメモ欄（${N_GROUPS}グループ）
        <button class="btn btn-outline btn-xs" style="margin-left:8px;font-size:10px;padding:2px 8px"
          onclick="S.memoBelow=!S.memoBelow;R()"
          title="${S.memoBelow?'トレード表の右横に戻す':'トレード表の下に移動する'}">
          ${S.memoBelow?'⬆ 右横に戻す':'⬇ 下に移動'}
        </button>
      </div>
      <div class="memo-meta">
        <div class="ctrl"><label>元金</label>
          <input type="number" style="width:82px" value="${S.capital}" placeholder="万円"
            oninput="S.capital=this.value"> <span>万円</span>
        </div>
        <div class="ctrl"><label>1P株数</label>
          <input type="number" style="width:72px" value="${S.shares}" placeholder="株"
            oninput="S.shares=this.value"> <span>株</span>
        </div>
        <span style="font-size:12px;font-weight:700;color:var(--orange)">現在: ${NUMS[S.gi]}</span>
        <span style="font-size:10px;color:var(--sub)">（右下ボタンで切替）</span>
      </div>
    </div>
    <div class="g-grid" style="grid-template-columns:repeat(${S.memoBelow?4:3},1fr)">${gcards}</div>
    <div style="padding:5px 14px;background:#FAFBFC;border-top:1px solid var(--border);font-size:10px;color:var(--sub);line-height:1.7">
      <b>凡例：</b>
      取り消し線＝決済済み /
      <span style="background:var(--warn-lt);border-radius:2px;padding:0 3px">黄色</span>＝6ヶ月自動決済 /
      <span style="color:var(--warn);font-weight:700">⚠期限</span>＝期限切れ /

/* ─── 相殺管理 ─── */
function rSosai(){
  const curP=C.curP;const sh=C.sh;

  const open=[
    ...calcGroupDisp(S.gi,'buy').filter(e=>!e.settled).map(e=>({...e,colType:'buy'})),
    ...calcGroupDisp(S.gi,'sell').filter(e=>!e.settled).map(e=>({...e,colType:'sell'}))
  ].sort((a,b)=>(b.price||0)-(a.price||0));
  const n=Math.min(open.length,7);const pos=open.slice(0,n);
  const LABS='ABCDEFGHIJ'.split('');

  const buys=pos.filter(e=>e.colType==='buy');
  const sells=pos.filter(e=>e.colType==='sell');
  const fixedPairs=[];
  buys.forEach(b=>sells.forEach(s=>{
    const diff=(s.price||0)-(b.price||0);
    fixedPairs.push({buy:b,sell:s,diff,type:diff>0?'rieki':diff<0?'son':'doji'});
  }));
  fixedPairs.sort((a,b)=>b.diff-a.diff);
  const sonTotal=fixedPairs.filter(p=>p.type==='son').reduce((s,p)=>s+p.diff*sh,0);
  const riekiTotal=fixedPairs.filter(p=>p.type==='rieki').reduce((s,p)=>s+p.diff*sh,0);

  let settledProfit=0;
  for(const ss of Object.values(S.settles)){
    for(const s of ss){
      const e=entryById(s.posId);if(!e||!e.price||!s.exitPrice)continue;
      settledProfit+=(e.type==='buy'?s.exitPrice-e.price:e.price-s.exitPrice)*sh;
    }
  }

  function rFixedSection(){
    if(!fixedPairs.length)return '';
    const rows=fixedPairs.map(p=>{
      const typeLabel=p.type==='rieki'?'利益固定':p.type==='son'?'損失固定':'同値固定';
      const amtCl=p.diff>0?'ppos':p.diff<0?'pneg':'';const amtVal=p.diff*sh;
      let desc='';
      if(p.type==='rieki')desc=`株価が${fn(p.buy.price)}〜${fn(p.sell.price)}の間に留まる限り+${fn(p.diff*sh)}円を確保。`;
      else if(p.type==='son')desc=`損失-${fn(Math.abs(p.diff*sh))}円固定。別ポジションで相殺可能。`;
      return `<div class="kf-row">
        <span class="kf-badge kf-${p.type}">${typeLabel}</span>
        <span class="tb">○${fn(p.buy.price)}</span><span style="color:var(--muted)">×</span><span class="ts">×${fn(p.sell.price)}</span>
        <span class="kf-amount ${amtCl}">${p.diff>=0?'+':''}${fn(amtVal)}円</span>
        <span class="kf-desc">${desc}</span>
      </div>`;
    }).join('');
    const summary=`${riekiTotal>0?`<span class="kf-badge kf-rieki">利益固定計 +${fn(riekiTotal)}円</span>`:''}
      ${sonTotal<0?`<span class="kf-badge kf-son">損失固定計 ${fn(sonTotal)}円</span>`:''}`;
    return `<div class="kf-section">
      <div class="kf-title" style="cursor:pointer;user-select:none" onclick="S.fixedOpen=!S.fixedOpen;R()">
        🔒 固定判定 ${summary}
        <span style="margin-left:auto;font-size:10px;background:#EEF2F6;padding:1px 8px;border-radius:4px;color:var(--sub)">${S.fixedOpen?'▲ 閉じる':'▼ 詳細表示'}</span>
      </div>
      ${S.fixedOpen?`<div>${rows}</div>`:''}
    </div>`;
  }

  function rJisaSection(){
    if(sonTotal>=0)return '';
    const deficit=Math.abs(sonTotal),recovered=Math.max(0,settledProfit),remaining=Math.max(0,deficit-recovered);
    const pct=Math.min(100,Math.round(recovered/deficit*100)),done=remaining<=0;
    const statusBadge=done?'<span class="kf-badge kf-rieki">✓ 相殺完了</span>'
      :`<span class="kf-badge kf-son">残り-${fn(Math.round(remaining))}円</span>`;
    return `<div class="kf-section">
      <div class="kf-title" style="cursor:pointer;user-select:none" onclick="S.jisaOpen=!S.jisaOpen;R()">
        ⏱ 時間差相殺トラッカー ${statusBadge}
        <span style="margin-left:auto;font-size:10px;background:#EEF2F6;padding:1px 8px;border-radius:4px;color:var(--sub)">${S.jisaOpen?'▲ 閉じる':'▼ 詳細表示'}</span>
      </div>
      ${S.jisaOpen?`<div>
        <div style="font-size:11px;display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px">
          <span>損失固定計: <b class="pneg">${fn(sonTotal)}円</b></span>
          <span>決済累計利益: <b class="${settledProfit>=0?'ppos':'pneg'}">${settledProfit>=0?'+':''}${fn(Math.round(settledProfit))}円</b></span>
          <span>残り必要利益: <b class="${remaining>0?'pneg':'ppos'}">${remaining>0?'-'+fn(Math.round(remaining)):'達成！'}</b></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${done?'var(--green)':'var(--blue)'}"></div>
        </div>
        <div style="font-size:10px;color:var(--sub);margin-top:2px">${pct}% 回収済み</div>
      </div>`:''}
    </div>`;
  }

  function rComboSection(){
    if(n<2)return '';
    const combos=[];
    for(let mask=0;mask<(1<<n);mask++){
      const bits=[];for(let i=0;i<n;i++)if(mask&(1<<i))bits.push(i);
      if(bits.length>=2)combos.push(bits);
    }
    function calcCombo(bits){
      const ps=bits.map(i=>pos[i]);const label=bits.map(i=>LABS[i]).join('+');
      const bs=ps.filter(e=>e.colType==='buy');const ss=ps.filter(e=>e.colType==='sell');
      const buySum=bs.reduce((s,e)=>s+(e.price||0),0);const sellSum=ss.reduce((s,e)=>s+(e.price||0),0);
      const netCount=bs.length-ss.length;
      const posStr=ps.map(e=>`<span class="${e.colType==='buy'?'tb':'ts'}">${e.colType==='buy'?'○':'×'}${fn(e.price)}</span>`)
        .join('<span style="color:var(--muted);margin:0 1px">+</span>');
      let resH='',sortKey=0;
      if(netCount===0){
        const fixed=sellSum-buySum;const cl=fixed>=0?'ppos':'pneg';
        resH=`<span class="sosai-res ${cl}">${fixed>=0?'+':''}${fn(fixed*sh)}円<span class="sosai-fix">(固定${fixed>=0?'益':'損'})</span></span>`;
        sortKey=fixed;
      } else if(netCount>0){
        const be=Math.round((buySum-sellSum)/netCount),ok=curP&&curP>be;
        const prof=ok?Math.round((curP-be)*netCount*sh):null;
        resH=`<span class="sosai-res ${ok?'sosai-ok':'sosai-ng'}">${fn(be)}↑${ok?`<span class="sosai-achieved">✓達成 +${fn(prof)}円</span>`:''}</span>`;
        sortKey=ok&&curP?Math.round((curP-be)*netCount*sh):-(be-(curP||0))*netCount*sh;
      } else {
        const be=Math.round((sellSum-buySum)/(-netCount)),ok=curP&&curP<be;
        const prof=ok?Math.round((be-curP)*(-netCount)*sh):null;
        resH=`<span class="sosai-res ${ok?'sosai-ok':'sosai-ng'}">${fn(be)}↓${ok?`<span class="sosai-achieved">✓達成 +${fn(prof)}円</span>`:''}</span>`;
        sortKey=ok&&curP?Math.round((be-curP)*(-netCount)*sh):-(curP||0-be)*(-netCount)*sh;
      }
      return{label,posStr,resH,size:bits.length,sortKey};
    }
    const bySize={};
    combos.forEach(bits=>{const r=calcCombo(bits);if(!bySize[r.size])bySize[r.size]=[];bySize[r.size].push(r);});
    Object.values(bySize).forEach(rs=>rs.sort((a,b)=>b.sortKey-a.sortKey));
    const sections=Object.entries(bySize).map(([sz,rs])=>`
      <div class="sosai-group">
        <div class="sosai-group-title" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none';this.querySelector('.sg-arrow').textContent=this.nextElementSibling.style.display===''?'▾':'▸'">
          ${sz}点相殺 <span style="font-size:10px;color:var(--muted)">(${rs.length}件)</span>
          <span class="sg-arrow">▾</span>
        </div>
        <div class="sosai-body">
          ${rs.map(r=>`<div class="sosai-row">
            <span class="sosai-lbl">${r.label}</span>
            <span class="sosai-pos">${r.posStr}</span>
            ${r.resH}
          </div>`).join('')}
        </div>
      </div>`).join('');
    const legend=pos.map((e,i)=>`<span style="margin-right:8px"><b>${LABS[i]}</b>:<span class="${e.colType==='buy'?'tb':'ts'}">${e.colType==='buy'?'○':'×'}</span>${fd(e.date)} ${fn(e.price)}円</span>`).join('');
    return `<div class="kf-section" style="padding-bottom:0;border-bottom:none">
      <div class="kf-title">🔀 相殺シミュレーション
        <span style="font-size:10px;color:var(--sub);font-weight:400">${legend}</span>
        ${curP?`<span style="margin-left:auto;font-size:11px">現在値: <b>${fn(curP)}円</b></span>`:''}
      </div>
      <div class="sosai-wrap" style="padding:0 0 8px 0">${sections}</div>
    </div>`;
  }

  if(n<2&&!fixedPairs.length)return `<div class="card">
    <div class="ch">⚖️ 相殺・固定管理
      <span style="font-size:10px;color:var(--sub);font-weight:400">グループ ${NUMS[S.gi]} の未決済2件以上で表示</span>
    </div>
    <div class="cb" style="color:var(--sub);font-size:11px">未決済ポジションが2件以上になると表示されます</div>
  </div>`;

  return `<div class="card">
    <div class="ch">⚖️ 相殺・固定管理
      <span style="font-size:10px;color:var(--sub);font-weight:400">グループ ${NUMS[S.gi]}</span>
    </div>
    ${rFixedSection()}${rJisaSection()}${rComboSection()}
  </div>`;
}

/* ─── ATR計算 ─── */
function calcATR(period=14){
  // 全ての公開済み日付を古い順に取得
  const revDstrs=[...C.revDstrs].sort();
  if(revDstrs.length<2)return null;
  const trs=[];
  for(let i=1;i<revDstrs.length;i++){
    const d=revDstrs[i];
    const prev=revDstrs[i-1];
    const h=S.highPrices[d]||S.prices[d];
    const l=S.lowPrices[d]||S.prices[d];
    const c=S.prices[d];
    const pc=S.prices[prev];
    if(!h||!l||!c||!pc)continue;
    const tr=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
    trs.push(tr);
  }
  if(!trs.length)return null;
  const recent=trs.slice(-period);
  return Math.round(recent.reduce((s,v)=>s+v,0)/recent.length);
}

      </div>
      <div style="background:#FFF0F0;border:1.5px solid var(--red-md);border-radius:6px;padding:8px 12px;margin-bottom:8px">
        <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:6px">🛑 損切りラインを計算</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--sub)">買いAの建値：</span>
          <input type="number" style="width:90px;font-size:12px;padding:3px 7px;border:1.5px solid var(--border);border-radius:5px"
            value="${S.atrBasePrice||''}" placeholder="例:1770"
            oninput="S.atrBasePrice=this.value;R()">
          <span style="font-size:11px;color:var(--sub)">円</span>
          ${baseP?`
            <span style="font-size:13px;font-weight:700;color:var(--red)">
              → ${fn(Math.round(baseP-stopLoss))}円で全決済リセット
              <span style="font-size:10px;font-weight:400;color:var(--sub)">（建値 − ${fn(stopLoss)}円）</span>
            </span>`
          :''}
        </div>
      </div>
      <div style="font-size:10px;color:var(--sub);background:#F5F7FA;border-radius:5px;padding:6px 10px">
        💡 このボラなら <b style="color:var(--orange)">${fn(slide)}円</b> 動いたらスライドの目安（ATR×${mult}倍）
      </div>`;
  }

  return `<div style="${panelStyle}">
    <div style="${hStyle}" onclick="S.atrOpen=!S.atrOpen;R()">
      📐 スライド戦略 ATRパネル
      <span style="font-size:10px;color:var(--sub);font-weight:400;margin-left:auto">▲ 閉じる</span>
    </div>
    <div style="padding:12px 14px">${atrH}</div>
  </div>`;
}


function rBottom(){
  const mp=monthProfit();const prev=Number(S.prevP)||0;const total=prev+Math.round(mp);
  const mcl=mp>0?'ppos':mp<0?'pneg':'';const tcl=total>0?'ppos':total<0?'pneg':'';
  return `<div class="card">
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:0;border-bottom:1px solid var(--border)">
      <div style="padding:8px 16px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap">📊 今月利益確定</span>
        <span class="tbig ${mcl}" style="font-size:16px">${mp!==0?(mp>0?'+':'')+fn(Math.round(mp))+'円':'0円'}</span>
      </div>
      <div style="padding:8px 16px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap">先月までの累計</span>
        <input type="number" style="width:110px;text-align:right" value="${S.prevP}" placeholder="0" oninput="S.prevP=this.value;R()">
        <span style="font-size:12px">円</span>
      </div>
      <div style="padding:8px 16px;border-right:1px solid var(--border);display:flex;align-items:center;gap:6px">
        <span class="op" style="font-size:16px">＋</span>
        <span class="tbig ${mcl}">${fn(Math.round(mp))}円</span>
        <span class="op" style="font-size:16px">＝</span>
      </div>
      <div style="padding:8px 16px;display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:700;color:var(--sub)">累計</span>
        <span class="tbig ${tcl}" style="font-size:20px">${fn(total)}円</span>
      </div>
    </div>
    <div style="padding:8px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;font-weight:700;color:var(--sub)">📝 メモ</span>
      <textarea style="flex:1;min-width:200px;height:40px" oninput="S.memo=this.value">${S.memo}</textarea>
    </div>
  </div>`;
}

/* ════════════════ INIT ════════════════ */
lsLoadMeta();
lsLoadPrices();
if(!lsLoadMonth(S.year,S.month)){resetMonthData();}
R();
</script>
